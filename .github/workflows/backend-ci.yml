name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "simplydigitals-aiarbitrageur-api/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "simplydigitals-aiarbitrageur-api/**"
      - ".github/workflows/backend-ci.yml"

env:
  PYTHON_VERSION: "3.11"
  WORKING_DIRECTORY: "./simplydigitals-aiarbitrageur-api"

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy bandit[toml] pip-audit

      - name: Lint with Ruff
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: ruff check . --select E,W,F,I,B,UP,N,ANN --format github

      - name: Type check with MyPy
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: mypy app/

      - name: Security scan with Bandit
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Check dependencies with pip-audit
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pip-audit || true

  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test,dev]"

      - name: Run tests with coverage
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: pytest tests/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ${{ env.WORKING_DIRECTORY }}/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-backend
          path: ${{ env.WORKING_DIRECTORY }}/htmlcov/

      - name: Comment coverage on PR
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 70
          PATH: ${{ env.WORKING_DIRECTORY }}
